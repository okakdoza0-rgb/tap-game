<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Artemwe Tap</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
margin:0;
}

#score{
font-size:40px;
margin-top:40px;
margin-bottom:20px;
}

img{
width:300px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="score">0</div>

<img src="artemwe.jpg" onclick="tap()">

<script>

let score = 0;

function tap(){
score++;
document.getElementById("score").innerText = score;
}

</script>

</body>
</html>
