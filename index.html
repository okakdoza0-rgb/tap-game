<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemwe Tap</title>

<style>
body{
margin:0;
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
position:relative;
}

#score{
color:white;
font-size:60px;
margin-bottom:40px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

#tap-wrap{
position:relative;
display:inline-block;
}

#tap{
width:260px;
cursor:pointer;
transition:transform 0.1s;
}

#tap:active{
transform:scale(0.95);
}

.plus{
position:absolute;
left:50%;
top:20px;
transform:translateX(-50%);
color:white;
font-size:32px;
font-weight:bold;
pointer-events:none;
animation:floatUp 0.8s ease-out forwards;
}

@keyframes floatUp{
0%{
opacity:1;
transform:translateX(-50%) translateY(0);
}
100%{
opacity:0;
transform:translateX(-50%) translateY(-80px);
}
}
</style>
</head>

<body>

<div id="score">
🪙 <span id="scoreNumber">0</span>
</div>

<div id="tap-wrap">
<img
id="tap"
src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png"
onclick="tap()"
>
</div>

<script>
let score = Number(localStorage.getItem("score")) || 0;
let lastTime = Number(localStorage.getItem("last_time")) || Date.now();

const scoreElement = document.getElementById("scoreNumber");
const tapWrap = document.getElementById("tap-wrap");

// считаем сколько времени игрока не было
const now = Date.now();
const secondsPassed = Math.floor((now - lastTime) / 1000);

// 1 монета каждые 5 секунд
const idleCoins = Math.floor(secondsPassed / 5);

score += idleCoins;

scoreElement.innerText = score;

localStorage.setItem("score", score);
localStorage.setItem("last_time", now);

// пассивный доход каждые 5 секунд
setInterval(() => {
score++;
scoreElement.innerText = score;

localStorage.setItem("score", score);
localStorage.setItem("last_time", Date.now());
}, 5000);

function tap(){
score++;
scoreElement.innerText = score;

localStorage.setItem("score", score);
localStorage.setItem("last_time", Date.now());

const plus = document.createElement("div");
plus.innerText = "+1";
plus.className = "plus";

tapWrap.appendChild(plus);

setTimeout(() => {
plus.remove();
}, 800);
}
</script>

</body>
</html>
