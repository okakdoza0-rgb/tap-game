<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemwe Tap</title>
<style>
body{
  margin:0;
  background:black;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:Arial;
  overflow:hidden;
  position:relative;
  color:white;
}

#score{
  color:white;
  font-size:60px;
  margin-bottom:30px;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
}

#tap-wrap{
  position:relative;
  display:inline-block;
}

#tap{
  width:260px;
  cursor:pointer;
  transition:transform 0.1s;
}

#tap:active{
  transform:scale(0.95);
}

.plus{
  position:absolute;
  left:50%;
  top:20px;
  transform:translateX(-50%);
  color:white;
  font-size:32px;
  font-weight:bold;
  pointer-events:none;
  animation:floatUp 0.8s ease-out forwards;
}

@keyframes floatUp{
  0%{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  100%{
    opacity:0;
    transform:translateX(-50%) translateY(-80px);
  }
}

#topBtn{
  margin-top:25px;
  padding:10px 18px;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
}

#leaderboardModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  box-sizing:border-box;
}

#leaderboardTitle{
  font-size:30px;
  margin-bottom:20px;
  font-weight:bold;
}

#leaderboardList{
  width:100%;
  max-width:420px;
  font-size:22px;
  line-height:1.6;
}

.leaderRow{
  margin-bottom:10px;
}

#closeTop{
  margin-top:20px;
  padding:10px 18px;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>
<body>

<div id="score">🪙 <span id="scoreNumber">0</span></div>

<div id="tap-wrap">
  <img
    id="tap"
    src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png"
    onclick="tap()"
  >
</div>

<button id="topBtn" onclick="openTop()">🏆 Топ игроков</button>

<div id="leaderboardModal">
  <div id="leaderboardTitle">🏆 Топ игроков</div>
  <div id="leaderboardList">Загрузка...</div>
  <button id="closeTop" onclick="closeTop()">Закрыть</button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
let score = Number(localStorage.getItem("score")) || 0;

const scoreElement = document.getElementById("scoreNumber");
const tapWrap = document.getElementById("tap-wrap");
const leaderboardList = document.getElementById("leaderboardList");

scoreElement.innerText = score;

function getTelegramUser() {
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
    const u = tg.initDataUnsafe.user;
    return {
      id: String(u.id),
      name: [u.first_name, u.last_name].filter(Boolean).join(' ') || u.username || 'Player',
      username: u.username ? '@' + u.username : ''
    };
  }

  let savedName = localStorage.getItem("player_name");
  if (!savedName) {
    savedName = prompt("Введите имя игрока") || "Player";
    localStorage.setItem("player_name", savedName);
  }

  return {
    id: "local_" + savedName,
    name: savedName,
    username: ""
  };
}

async function saveScore() {
  const user = getTelegramUser();

  try {
    await fetch('/save-score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: user.id,
        name: user.name,
        username: user.username,
        score: score
      })
    });
  } catch (e) {}
}

function tap(){
  score++;
  scoreElement.innerText = score;
  localStorage.setItem("score", score);

  const plus = document.createElement("div");
  plus.innerText = "+1";
  plus.className = "plus";
  tapWrap.appendChild(plus);

  setTimeout(() => {
    plus.remove();
  }, 800);

  saveScore();
}

async function openTop() {
  document.getElementById("leaderboardModal").style.display = "flex";
  leaderboardList.innerHTML = "Загрузка...";

  try {
    const res = await fetch('/leaderboard');
    const data = await res.json();

    if (!data.length) {
      leaderboardList.innerHTML = "Пока нет игроков";
      return;
    }

    leaderboardList.innerHTML = data.map((player, index) => {
      const userText = player.username ? ` (${player.username})` : "";
      return `<div class="leaderRow">${index + 1}. ${player.name}${userText} — ${player.score} 🪙</div>`;
    }).join('');
  } catch (e) {
    leaderboardList.innerHTML = "Ошибка загрузки топа";
  }
}

function closeTop() {
  document.getElementById("leaderboardModal").style.display = "none";
}

saveScore();
</script>

</body>
</html>
