<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Artemwe Tap</title>

<style>

body{
margin:0;
background:url("1F67980F-7FC8-460D-B978-4E22B48E7767.png") center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
position:relative;
touch-action:manipulation;
}

#score{
color:white;
font-size:60px;
margin-bottom:40px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

#tap-wrap{
position:relative;
display:inline-block;
}

#tap{
width:260px;
cursor:pointer;
transition:transform 0.1s;
user-select:none;
-webkit-user-select:none;
}

#tap:active{
transform:scale(0.95);
}

.plus{
position:absolute;
left:50%;
top:20px;
transform:translateX(-50%);
color:white;
font-size:32px;
font-weight:bold;
pointer-events:none;
animation:floatUp 0.8s ease-out forwards;
}

@keyframes floatUp{
0%{
opacity:1;
transform:translateX(-50%) translateY(0);
}
100%{
opacity:0;
transform:translateX(-50%) translateY(-80px);
}
}

/* КНОПКА УЛУЧШЕНИЯ */

#upgradeBtn{
position:fixed;
bottom:30px;
left:20px;
background:#222;
color:white;
padding:12px 18px;
border-radius:15px;
cursor:pointer;
}

/* ЭКРАН УЛУЧШЕНИЙ */

#upgradeScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

#task{
background:#222;
padding:20px;
border-radius:15px;
width:260px;
text-align:center;
}

#task.done{
background:#111;
opacity:0.6;
}

.redLine{
height:4px;
background:red;
margin-top:10px;
display:none;
}

#task.done .redLine{
display:block;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#back{
position:absolute;
top:20px;
left:20px;
font-size:22px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="score">
🪙 <span id="scoreNumber">0</span>
</div>

<div id="tap-wrap">
<img
id="tap"
src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png"
onclick="tap()"
>
</div>

<div id="upgradeBtn" onclick="openUpgrades()">⚡ Улучшения</div>

<div id="upgradeScreen">

<div id="back" onclick="closeUpgrades()">← Назад</div>

<h2>Улучшения</h2>

<div id="task">

<div>⚡ +1 клик</div>

<div>Цена: 5000 🪙</div>

<button onclick="buyUpgrade()">Купить</button>

<div class="redLine"></div>

</div>

</div>

<script>

document.addEventListener('dblclick', function(e){
e.preventDefault();
});

let score = Number(localStorage.getItem("score")) || 0;
let clickPower = Number(localStorage.getItem("clickPower")) || 1;
let bought = localStorage.getItem("upgradeBought") === "true";

const scoreElement = document.getElementById("scoreNumber");
const tapWrap = document.getElementById("tap-wrap");
const task = document.getElementById("task");

scoreElement.innerText = score;

if(bought){
task.classList.add("done");
}

/* ТАП */

function tap(){

score += clickPower;

scoreElement.innerText = score;

localStorage.setItem("score", score);

const plus = document.createElement("div");

plus.innerText = "+" + clickPower;

plus.className = "plus";

tapWrap.appendChild(plus);

setTimeout(() => {

plus.remove();

}, 800);

}

/* ОТКРЫТЬ УЛУЧШЕНИЯ */

function openUpgrades(){

document.getElementById("upgradeScreen").style.display = "flex";

}

/* ЗАКРЫТЬ УЛУЧШЕНИЯ */

function closeUpgrades(){

document.getElementById("upgradeScreen").style.display = "none";

}

/* ПОКУПКА */

function buyUpgrade(){

if(bought) return;

if(score >= 5000){

score -= 5000;

clickPower = 2;

bought = true;

localStorage.setItem("score", score);
localStorage.setItem("clickPower", clickPower);
localStorage.setItem("upgradeBought", true);

scoreElement.innerText = score;

task.classList.add("done");

}else{

alert("Недостаточно монет");

}

}

</script>

</body>
</html>
