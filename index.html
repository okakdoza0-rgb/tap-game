<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Artemwe Tap</title>

<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.game{
position:relative;
display:flex;
flex-direction:column;
align-items:center;
}

#score{
color:white;
font-size:50px;
margin-bottom:20px; /* расстояние над головой */
}

img{
width:260px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="game">

<div id="score">0</div>

<img src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png" onclick="tap()">

</div>

<script>

let score = Number(localStorage.getItem("score")) || 0;
document.getElementById("score").innerText = score;

function tap(){
score++;
document.getElementById("score").innerText = score;
localStorage.setItem("score", score);
}

</script>

</body>
</html>
