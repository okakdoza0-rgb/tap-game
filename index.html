<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Artemwe Tap</title>

<style>
body{
margin:0;
background:url("1F67980F-7FC8-460D-B978-4E22B48E7767.png") center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
position:relative;
touch-action:manipulation;
}

#score{
color:white;
font-size:60px;
margin-bottom:40px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

#tap{
width:260px;
cursor:pointer;
transition:transform 0.1s;
}

#tap:active{ transform:scale(0.95); }

.plus{
position:absolute;
left:50%;
top:20px;
transform:translateX(-50%);
color:white;
font-size:32px;
font-weight:bold;
pointer-events:none;
animation:floatUp 0.8s ease-out forwards;
}

@keyframes floatUp{
0%{opacity:1; transform:translateX(-50%) translateY(0);}
100%{opacity:0; transform:translateX(-50%) translateY(-80px);}
}

/* кнопка улучшений */
#upgradeBtn{
position:fixed;
left:20px;
bottom:20px;
background:rgba(255,255,255,0.15);
border:none;
color:white;
font-size:18px;
padding:12px 18px;
border-radius:14px;
}

/* окно улучшений */
#upgradeScreen{
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
padding:20px;
color:white;
}

#backBtn{
background:none;
border:none;
color:white;
font-size:22px;
margin-bottom:20px;
}

.upgrade{
background:rgba(255,255,255,0.08);
border-radius:16px;
padding:16px;
margin-bottom:14px;
position:relative;
}

.upgrade.done{
background:rgba(0,0,0,0.6);
}

.doneLine{
position:absolute;
left:0;
right:0;
top:50%;
height:4px;
background:red;
display:none;
}

.upgrade.done .doneLine{
display:block;
}

.buyBtn{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#5865f2;
color:white;
font-size:16px;
}

.buyBtn:disabled{
background:#444;
}
</style>
</head>

<body>

<div id="score">
🪙 <span id="scoreNumber">0</span>
</div>

<img id="tap" src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png" onclick="tap()">

<button id="upgradeBtn" onclick="openUpgrades()">⚡ Улучшения</button>

<div id="upgradeScreen">

<button id="backBtn" onclick="closeUpgrades()">← Назад</button>

<div id="upgrade1" class="upgrade">
<div class="doneLine"></div>
<div>⚡ +1 клик</div>
<div>Цена: 500 🪙</div>
<button class="buyBtn" onclick="buyUpgrade(1)">Купить</button>
</div>

<div id="upgrade2" class="upgrade">
<div class="doneLine"></div>
<div>⚡ +1 клик</div>
<div>Цена: 2000 🪙</div>
<button class="buyBtn" onclick="buyUpgrade(2)">Купить</button>
</div>

<div id="upgrade3" class="upgrade">
<div class="doneLine"></div>
<div>⚡ +1 клик</div>
<div>Цена: 10000 🪙</div>
<button class="buyBtn" onclick="buyUpgrade(3)">Купить</button>
</div>

</div>

<script>
let score = Number(localStorage.getItem("score")) || 0;
let tapPower = Number(localStorage.getItem("tap_power")) || 1;

let u1 = localStorage.getItem("u1") === "true";
let u2 = localStorage.getItem("u2") === "true";
let u3 = localStorage.getItem("u3") === "true";

const scoreElement = document.getElementById("scoreNumber");
scoreElement.innerText = score;

function tap(){
score += tapPower;
scoreElement.innerText = score;
localStorage.setItem("score",score);
}

function openUpgrades(){
document.getElementById("upgradeScreen").style.display="flex";
updateUpgrades();
}

function closeUpgrades(){
document.getElementById("upgradeScreen").style.display="none";
}

function buyUpgrade(id){

if(id===1 && !u1 && score>=500){
score-=500;
tapPower+=1;
u1=true;
localStorage.setItem("u1",true);
}

if(id===2 && !u2 && score>=2000){
score-=2000;
tapPower+=1;
u2=true;
localStorage.setItem("u2",true);
}

if(id===3 && !u3 && score>=10000){
score-=10000;
tapPower+=1;
u3=true;
localStorage.setItem("u3",true);
}

localStorage.setItem("tap_power",tapPower);
localStorage.setItem("score",score);

scoreElement.innerText=score;

updateUpgrades();
}

function updateUpgrades(){

if(u1){
document.getElementById("upgrade1").classList.add("done");
document.querySelector("#upgrade1 .buyBtn").disabled=true;
}

if(u2){
document.getElementById("upgrade2").classList.add("done");
document.querySelector("#upgrade2 .buyBtn").disabled=true;
}

if(u3){
document.getElementById("upgrade3").classList.add("done");
document.querySelector("#upgrade3 .buyBtn").disabled=true;
}

}
updateUpgrades();
</script>

</body>
</html>
