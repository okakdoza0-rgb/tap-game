<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Artemwe Tap</title>

<style>
body{
margin:0;
background:url("1F67980F-7FC8-460D-B978-4E22B48E7767.png") center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
position:relative;
touch-action:manipulation;
}

#score{
color:white;
font-size:60px;
margin-bottom:40px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

#tap-wrap{
position:relative;
display:inline-block;
}

#tap{
width:260px;
cursor:pointer;
transition:transform 0.1s;
user-select:none;
-webkit-user-select:none;
}

#tap:active{
transform:scale(0.95);
}

.plus{
position:absolute;
left:50%;
top:20px;
transform:translateX(-50%);
color:white;
font-size:32px;
font-weight:bold;
pointer-events:none;
animation:floatUp 0.8s ease-out forwards;
}

@keyframes floatUp{
0%{
opacity:1;
transform:translateX(-50%) translateY(0);
}
100%{
opacity:0;
transform:translateX(-50%) translateY(-80px);
}
}

/* окно оффлайн дохода */
#offlineBox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

#offlineCard{
width:320px;
max-width:90%;
background:#1e1f2b;
border-radius:28px;
padding:24px 20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

#offlineCoins{
font-size:54px;
font-weight:bold;
color:white;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
margin-bottom:18px;
}

#offlineText{
font-size:22px;
font-weight:bold;
color:white;
line-height:1.3;
margin-bottom:24px;
}

#claimBtn{
width:100%;
padding:20px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:24px;
background:#5865f2;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div id="score">
🪙 <span id="scoreNumber">0</span>
</div>

<div id="tap-wrap">
<img
id="tap"
src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png"
onclick="tap()"
>
</div>

<div id="offlineBox">
  <div id="offlineCard">
    <div id="offlineCoins">🪙 <span id="offlineAmount">0</span></div>
    <div id="offlineText">Биржа начала работать для вас</div>
    <button id="claimBtn" onclick="claimOffline()">Спасибо, Bybit 🤍</button>
  </div>
</div>

<script>
document.addEventListener('dblclick', function(e){
e.preventDefault();
});

let score = Number(localStorage.getItem("score")) || 0;
let lastTime = Number(localStorage.getItem("last_time")) || Date.now();
let offlineCoins = 0;

const scoreElement = document.getElementById("scoreNumber");
const tapWrap = document.getElementById("tap-wrap");
const offlineBox = document.getElementById("offlineBox");
const offlineAmount = document.getElementById("offlineAmount");

// считаем сколько накопилось пока игрока не было
const now = Date.now();
const secondsPassed = Math.floor((now - lastTime) / 1000);
offlineCoins = Math.floor(secondsPassed / 5);

// показываем текущий счёт
scoreElement.innerText = score;

// если накопились оффлайн-монеты — показываем окно
if (offlineCoins > 0) {
offlineAmount.innerText = formatCoins(offlineCoins);
offlineBox.style.display = "flex";
}

// онлайн-доход: 1 монета каждые 5 секунд
setInterval(() => {
score++;
scoreElement.innerText = score;
localStorage.setItem("score", score);
localStorage.setItem("last_time", Date.now());
}, 5000);

function claimOffline(){
score += offlineCoins;
scoreElement.innerText = score;

localStorage.setItem("score", score);
localStorage.setItem("last_time", Date.now());

offlineCoins = 0;
offlineBox.style.display = "none";
}

function tap(){
score++;
scoreElement.innerText = score;
localStorage.setItem("score", score);
localStorage.setItem("last_time", Date.now());

const plus = document.createElement("div");
plus.innerText = "+1";
plus.className = "plus";

tapWrap.appendChild(plus);

setTimeout(() => {
plus.remove();
}, 800);
}

function formatCoins(value){
if (value >= 1000000) {
return (value / 1000000).toFixed(2).replace(".", ",") + "M";
}
if (value >= 1000) {
return (value / 1000).toFixed(2).replace(".", ",") + "K";
}
return value;
}
</script>

</body>
</html>
