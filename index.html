<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemwe Tap</title>

<style>

body{
margin:0;
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
color:white;
}

#score{
font-size:60px;
margin-bottom:40px;
font-weight:bold;
display:flex;
gap:10px;
align-items:center;
}

#tap{
width:260px;
cursor:pointer;
}

#upgradeBtn{
position:fixed;
bottom:30px;
left:20px;
background:#333;
padding:12px 18px;
border-radius:15px;
cursor:pointer;
}

#upgradeScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

#task{
background:#222;
padding:20px;
border-radius:15px;
width:260px;
text-align:center;
}

#task.done{
background:#111;
opacity:0.6;
}

.redLine{
height:4px;
background:red;
margin-top:10px;
display:none;
}

#task.done .redLine{
display:block;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#back{
position:absolute;
top:20px;
left:20px;
cursor:pointer;
font-size:20px;
}

</style>
</head>

<body>

<div id="score">🪙 <span id="scoreNumber">0</span></div>

<img id="tap" src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png" onclick="tap()">

<div id="upgradeBtn" onclick="openUpgrades()">⚡ Улучшения</div>

<div id="upgradeScreen">

<div id="back" onclick="closeUpgrades()">← Назад</div>

<h2>Улучшения</h2>

<div id="task">

<div>⚡ +1 клик</div>

<div>Цена: 5000 🪙</div>

<button onclick="buyUpgrade()">Купить</button>

<div class="redLine"></div>

</div>

</div>

<script>

let score = Number(localStorage.getItem("score")) || 0;
let clickPower = Number(localStorage.getItem("clickPower")) || 1;
let bought = localStorage.getItem("upgradeBought") === "true";

const scoreElement = document.getElementById("scoreNumber");
const task = document.getElementById("task");

scoreElement.innerText = score;

if(bought){
task.classList.add("done");
}

function tap(){

score += clickPower;

scoreElement.innerText = score;

localStorage.setItem("score", score);

}

function openUpgrades(){

document.getElementById("upgradeScreen").style.display = "flex";

}

function closeUpgrades(){

document.getElementById("upgradeScreen").style.display = "none";

}

function buyUpgrade(){

if(bought) return;

if(score >= 5000){

score -= 5000;

clickPower = 2;

bought = true;

localStorage.setItem("score", score);
localStorage.setItem("clickPower", clickPower);
localStorage.setItem("upgradeBought", true);

scoreElement.innerText = score;

task.classList.add("done");

}else{

alert("Недостаточно монет");

}

}

</script>

</body>
</html>
