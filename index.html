<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Artemwe Tap</title>

<style>

body{
margin:0;
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
position:relative;
touch-action:manipulation;
}

#score{
color:white;
font-size:60px;
margin-bottom:40px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

#tap-wrap{
position:relative;
display:inline-block;
}

#tap{
width:260px;
cursor:pointer;
transition:transform 0.1s;
user-select:none;
-webkit-user-select:none;
}

#tap:active{
transform:scale(0.95);
}

.plus{
position:absolute;
left:50%;
top:20px;
transform:translateX(-50%);
color:white;
font-size:32px;
font-weight:bold;
pointer-events:none;
animation:floatUp 0.8s ease-out forwards;
}

@keyframes floatUp{
0%{
opacity:1;
transform:translateX(-50%) translateY(0);
}
100%{
opacity:0;
transform:translateX(-50%) translateY(-80px);
}
}

/* ЭНЕРГИЯ */

#energyBox{
position:fixed;
bottom:30px;
left:20px;
display:flex;
align-items:center;
gap:10px;
color:white;
font-size:26px;
font-weight:bold;
background:rgba(255,255,255,0.05);
padding:10px 16px;
border-radius:16px;
}

#energyIcon{
color:#ffb52e;
font-size:32px;
}

</style>
</head>

<body>

<div id="score">
🪙 <span id="scoreNumber">0</span>
</div>

<div id="tap-wrap">
<img
id="tap"
src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png"
onclick="tap()"
>
</div>

<div id="energyBox">
<span id="energyIcon">⚡</span>
<span id="energyText">1000 / 1000</span>
</div>

<script>

document.addEventListener('dblclick', function(e){
e.preventDefault();
});

let score = Number(localStorage.getItem("score")) || 0;
let energy = Number(localStorage.getItem("energy")) || 1000;
const maxEnergy = 1000;

const scoreElement = document.getElementById("scoreNumber");
const tapWrap = document.getElementById("tap-wrap");
const energyText = document.getElementById("energyText");

scoreElement.innerText = score;
energyText.innerText = energy + " / " + maxEnergy;

function tap(){

if(energy <= 0){
return;
}

score++;
energy--;

scoreElement.innerText = score;
energyText.innerText = energy + " / " + maxEnergy;

localStorage.setItem("score", score);
localStorage.setItem("energy", energy);

const plus = document.createElement("div");

plus.innerText = "+1";

plus.className = "plus";

tapWrap.appendChild(plus);

setTimeout(() => {
plus.remove();
}, 800);

}

/* восстановление энергии */

setInterval(() => {

if(energy < maxEnergy){

energy++;

energyText.innerText = energy + " / " + maxEnergy;

localStorage.setItem("energy", energy);

}

}, 2000);

</script>

</body>
</html>
