<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemwe Tap</title>

<style>
body{
margin:0;
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
color:white;
overflow:hidden;
}

#score{
font-size:60px;
margin-bottom:30px;
font-weight:bold;
}

#tap{
width:260px;
cursor:pointer;
transition:transform 0.1s;
}

#tap:active{
transform:scale(0.95);
}

button{
margin-top:30px;
padding:10px 20px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
}

#leaderboard{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
flex-direction:column;
align-items:center;
justify-content:center;
}

#leaderboard h2{
margin-bottom:20px;
}

.player{
font-size:22px;
margin:5px;
}
</style>
</head>

<body>

<div id="score">🪙 0</div>

<img
id="tap"
src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png"
onclick="tap()"
>

<button onclick="openTop()">🏆 Топ игроков</button>

<div id="leaderboard">
<h2>🏆 Топ игроков</h2>

<div class="player">1. Artemwe — 20000 🪙</div>
<div class="player">2. Player — 15000 🪙</div>
<div class="player">3. User — 10000 🪙</div>

<br>
<button onclick="closeTop()">Назад</button>
</div>

<script>
let score = Number(localStorage.getItem("score")) || 0;
const scoreElement = document.getElementById("score");

scoreElement.innerText = "🪙 " + score;

function tap(){
score++;
scoreElement.innerText = "🪙 " + score;
localStorage.setItem("score", score);
}

function openTop(){
document.getElementById("leaderboard").style.display="flex";
}

function closeTop(){
document.getElementById("leaderboard").style.display="none";
}
</script>

</body>
</html>
