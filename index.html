<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemwe Tap</title>

<style>
body{
margin:0;
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial, sans-serif;
overflow:hidden;
}

#score{
color:white;
font-size:60px;
margin-bottom:40px;
font-weight:bold;
}

#tap{
width:260px;
cursor:pointer;
transition:transform 0.1s;
}

#tap:active{
transform:scale(0.95);
}
</style>
</head>

<body>

<div id="score">0</div>

<img
id="tap"
src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png"
onclick="tap()"
alt="Artemwe"
>

<script>
let score = Number(localStorage.getItem("score")) || 0;

const scoreElement = document.getElementById("score");
scoreElement.innerText = score;

function tap(){
  score++;
  scoreElement.innerText = score;
  localStorage.setItem("score", score);
}

if(!localStorage.getItem("welcome")){
  alert("👋 Привет!\n\nДобро пожаловать в игру ArTap!\n\n🪙 Нажимай на Artemwe\n⚡ Набивай очки\n🏆 Стань лучшим игроком!");
  localStorage.setItem("welcome","yes");
}
</script>

</body>
</html>
