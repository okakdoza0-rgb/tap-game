<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Artemwe Tap</title>

<style>
body{
margin:0;
background:url("1F67980F-7FC8-460D-B978-4E22B48E7767.png") center/cover no-repeat;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
overflow:hidden;
position:relative;
touch-action:manipulation;
}

#score{
color:white;
font-size:60px;
margin-bottom:40px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
z-index:2;
}

#tap-wrap{
position:relative;
display:inline-block;
z-index:2;
}

#tap{
width:260px;
cursor:pointer;
transition:transform 0.1s;
user-select:none;
-webkit-user-select:none;
}

#tap:active{
transform:scale(0.95);
}

.plus{
position:absolute;
left:50%;
top:20px;
transform:translateX(-50%);
color:white;
font-size:32px;
font-weight:bold;
pointer-events:none;
animation:floatUp 0.8s ease-out forwards;
}

@keyframes floatUp{
0%{
opacity:1;
transform:translateX(-50%) translateY(0);
}
100%{
opacity:0;
transform:translateX(-50%) translateY(-80px);
}
}

/* нижняя кнопка */
#upgradeBtn{
position:fixed;
left:20px;
bottom:20px;
background:rgba(255,255,255,0.12);
color:white;
border:1px solid rgba(255,255,255,0.25);
border-radius:18px;
padding:14px 18px;
font-size:18px;
font-weight:bold;
backdrop-filter:blur(8px);
-webkit-backdrop-filter:blur(8px);
z-index:5;
}

/* окно улучшений */
#upgradeScreen{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:none;
flex-direction:column;
padding:20px;
box-sizing:border-box;
z-index:20;
color:white;
}

#upgradeTop{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

#backBtn{
background:rgba(255,255,255,0.12);
color:white;
border:none;
border-radius:14px;
padding:12px 16px;
font-size:18px;
font-weight:bold;
}

#upgradeTitle{
font-size:32px;
font-weight:bold;
text-align:center;
flex:1;
}

.upgradeCard{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);
border-radius:22px;
padding:18px;
margin-bottom:14px;
}

.upgradeName{
font-size:24px;
font-weight:bold;
margin-bottom:8px;
}

.upgradeDesc{
font-size:18px;
opacity:0.9;
margin-bottom:12px;
}

.buyBtn{
width:100%;
background:#5865f2;
color:white;
border:none;
border-radius:16px;
padding:14px;
font-size:18px;
font-weight:bold;
}

#powerInfo{
font-size:20px;
margin-bottom:18px;
text-align:center;
opacity:0.95;
}
</style>
</head>

<body>

<div id="score">
🪙 <span id="scoreNumber">0</span>
</div>

<div id="tap-wrap">
<img
id="tap"
src="FA9BC995-07D9-4B53-AB69-3AD0DAD933B8.png"
onclick="tap()"
>
</div>

<button id="upgradeBtn" onclick="openUpgrades()">⚡ Улучшения</button>

<div id="upgradeScreen">
  <div id="upgradeTop">
    <button id="backBtn" onclick="closeUpgrades()">← Назад</button>
    <div id="upgradeTitle">Улучшения</div>
    <div style="width:90px;"></div>
  </div>

  <div id="powerInfo">
    Сила клика: <span id="tapPowerText">1</span>
  </div>

  <div class="upgradeCard">
    <div class="upgradeName">⚡ Сила клика</div>
    <div class="upgradeDesc">Каждое улучшение даёт +1 монету за тап</div>
    <button class="buyBtn" onclick="buyTapPower()">Купить за <span id="tapUpgradePrice">100</span> 🪙</button>
  </div>
</div>

<script>
document.addEventListener('dblclick', function(e){
e.preventDefault();
});

let score = Number(localStorage.getItem("score")) || 0;
let tapPower = Number(localStorage.getItem("tap_power")) || 1;
let tapUpgradePrice = Number(localStorage.getItem("tap_upgrade_price")) || 100;

const scoreElement = document.getElementById("scoreNumber");
const tapWrap = document.getElementById("tap-wrap");
const tapPowerText = document.getElementById("tapPowerText");
const tapUpgradePriceText = document.getElementById("tapUpgradePrice");

scoreElement.innerText = score;
tapPowerText.innerText = tapPower;
tapUpgradePriceText.innerText = tapUpgradePrice;

function tap(){
score += tapPower;
scoreElement.innerText = score;
localStorage.setItem("score", score);

const plus = document.createElement("div");
plus.innerText = "+" + tapPower;
plus.className = "plus";

tapWrap.appendChild(plus);

setTimeout(() => {
plus.remove();
}, 800);
}

function openUpgrades(){
document.getElementById("upgradeScreen").style.display = "flex";
}

function closeUpgrades(){
document.getElementById("upgradeScreen").style.display = "none";
}

function buyTapPower(){
if(score < tapUpgradePrice){
alert("Недостаточно монет");
return;
}

score -= tapUpgradePrice;
tapPower += 1;
tapUpgradePrice = Math.floor(tapUpgradePrice * 1.8);

scoreElement.innerText = score;
tapPowerText.innerText = tapPower;
tapUpgradePriceText.innerText = tapUpgradePrice;

localStorage.setItem("score", score);
localStorage.setItem("tap_power", tapPower);
localStorage.setItem("tap_upgrade_price", tapUpgradePrice);
}
</script>

</body>
</html>
